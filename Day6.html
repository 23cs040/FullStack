<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        .container1{
            display:flex;
            flex-direction: row;

            width:80px;
            text-align: start;
        }

        }
        .div3{
            background-color: red;
            height:30px;
            width:80px;

        }

        .div5{

            width:80px;

        }

        .div6_3{

            height:80px;

        }
        .btn{
            visibility: hidden;
        }
        .div7{
            background-color:hotpink;
            display:inline;
        }
        .span1{
            display: block;
            background-color:honeydew;
        }
        .span2{

</head>

    <div class="container1">
